층수_높이_길이별_검토사항:
  # 1. 층수 기준 검토사항
  층수_기준:
    내화구조_의무대상:
      주요구조부_및_지붕:
        층수_이상: 3
        지하층_존재여부: true
        예외시설: ["단독주택(일반)", "동식물관련시설", "발전시설(부속제외)", "교도소/소년원", "묘지관련시설(화장시설 제외)", "철강공장 제어실(50㎡ 이하)"]
      지하층_부분한정:
        층수_이하: 2 # 2층 이하이면서 지하층이 있는 경우 지하층만 적용

  # 2. 높이 기준 검토사항
  높이_기준:
    # (문서 내 추가적인 높이 관련 절대 수치가 있다면 이 부분에 추가)
    # 현재 스니펫 상에는 높이에 대한 구체적인 허가/신고 기준 수치가 보이지 않습니다. 
    # (예: "높이 13m 이상 건축물 구조안전 확인" 등의 내용이 있다면 여기에 배치)

  # 3. 길이(경간) 기준 검토사항
  경간_기준:
    구조안전_확인서류_제출대상:
      기둥과_기둥사이_거리_이상_m: 10 # 착공신고 시 허가권자에게 제출
    내진능력_공개대상:
      기둥과_기둥사이_거리_이상_m: 10 # 사용승인 받는 즉시 공개
    특수구조_건축물_해당:
      기둥과_기둥사이_거리_이상_m: 20 # 한쪽 끝은 고정, 다른 끝은 지지되지 않은 구조 등 포함