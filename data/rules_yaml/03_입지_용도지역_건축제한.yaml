용도지역_건축제한:
  # 대표 사례: 제1종 전용주거지역 기준 (국토계획법 시행령 별표 2)
  제1종전용주거지역:
    # 1. 법령상 원칙적으로 건축할 수 있는 건축물 (is_permitted: true)
    법정_허용건축물:
      단독주택:
        is_permitted: true
        제외대상: ["다가구주택"] # 다가구주택은 조례로 위임
      제1종근린생활시설:
        is_permitted: true
        바닥면적합계_미만_sqm: 1000
        제외대상: ["공중화장실", "대피소", "지역아동센터"]

    # 2. 도시·군계획조례가 정하는 바에 의하여 건축할 수 있는 건축물
    조례_허용건축물:
      # 조례 허용 건축물에 적용되는 공통 수치 조건
      공통조건:
        기본_최대층수_이하_층: 4 
        예외조항: "도시·군계획조례로 따로 층수를 정하는 경우에는 그 층수 이하 적용"
        
      단독주택_중_다가구주택:
        is_permitted: true
      공동주택:
        is_permitted: true
        허용대상: ["연립주택", "다세대주택"]
        제외대상: ["아파트"] # 아파트 건축 불가
      제2종근린생활시설:
        is_permitted: true
        허용대상: ["종교집회장(아목)", "금융업소/사무소(자목)", "안마시술소(러목)"]
      문화_및_집회시설:
        is_permitted: true
        허용대상: ["전시장", "미술관", "박물관"]
      종교시설:
        is_permitted: true
      교육연구시설_및_노유자시설:
        is_permitted: true
        허용대상: ["유치원", "초등학교", "중학교", "고등학교", "노유자시설"]
      운동시설:
        is_permitted: true
      창고시설:
        is_permitted: true
        제한조건: "농업·임업·축산업·수산업용에 한함"
      동식물관련시설:
        is_permitted: true
      공공_및_특수시설:
        교정시설: { is_permitted: true }
        국방_군사시설: { is_permitted: true }
        방송통신시설: { is_permitted: true }
        발전시설: { is_permitted: true }

  # 엔진 판정용 플래그 메타데이터
  판정_메타데이터:
    규제_우선순위: "법령 > 지자체 조례"
    면적검토_기준: "바닥면적합계"
    면적단위: "sqm"