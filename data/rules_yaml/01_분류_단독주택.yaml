단독주택:
  # 용도별 분류 기준 [cite: 1, 2]
  분류기준:
    다중주택:
      max_floor_area_sqm: 660
      max_floors: 3 # 지하층 제외, 1층 필로티 주차장 시 제외
      independent_living_form: false # 취사시설 설치 불가
    다가구주택:
      max_floor_area_sqm: 660
      max_floors: 3 # 지하층 제외, 1층 필로티 주차장 시 제외
      max_households: 19 # 대지 내 동별 세대수 합산

  # 용도지역별 건폐율 및 용적률 제한 [cite: 1, 2]
  건축제한:
    주거지역:
      제1종전용: { max_건폐율: 50, min_용적률: 50, max_용적률: 100 }
      제2종전용: { max_건폐율: 50, min_용적률: 50, max_용적률: 150 }
      제1종일반: { max_건폐율: 60, min_용적률: 100, max_용적률: 200 }
      제2종일반: { max_건폐율: 60, min_용적률: 100, max_용적률: 250 }
      제3종일반: { max_건폐율: 50, min_용적률: 100, max_용적률: 300 }
      준주거: { max_건폐율: 70, min_용적률: 200, max_용적률: 500 }
    상업지역:
      중심일반: { is_permitted: "A" } # 조건부 허용
      일반상업: { is_permitted: "X" } # 건축 금지
      근린상업: { max_건폐율: 70, min_용적률: 200, max_용적률: 900 }
      유통상업: { is_permitted: "X" }
    공업지역:
      전용공업: { is_permitted: "X" }
      일반공업: { is_permitted: "X" }
      준공업: { is_permitted: "X" }
    녹지지역:
      보전녹지: { is_permitted: "X" }
      생산녹지: { max_건폐율: 20, min_용적률: 50, max_용적률: 100 }
      자연녹지: { max_건폐율: 20, min_용적률: 50, max_용적률: 100 }
    기타지역:
      보전관리: { max_건폐율: 20, min_용적률: 50, max_용적률: 80 }
      생산관리: { max_건폐율: 20, min_용적률: 50, max_용적률: 80 }
      계획관리: { max_건폐율: 40, min_용적률: 50, max_용적률: 100 }
      농림지역: { is_permitted: "A" }
      자연환경보전: { is_permitted: "A" }

  # 건축 인허가 기준 [cite: 10, 11]
  인허가_기준:
    건축허가대상:
      신축_연면적_초과_sqm: 100
      증개축_바닥면적합계_초과_sqm: 85 # 3층 이상 건축물은 연면적의 1/10 초과 시
      높이증축_초과_m: 3
    시공자제한:
      건설사업자_시공_연면적_초과_sqm: 200

  # 대지 및 도로 요건 [cite: 14, 15]
  대지_및_도로_요건:
    조경의무_대지면적_이상_sqm: 200
    대지_도로접도의무_이상_m: 2

  # 건축물 내부 설계 및 거주환경 기준 [cite: 24, 26, 28, 29]
  설계_및_환경_기준:
    거실_반자높이_이상_m: 2.1
    채광창_거실면적대비_비율_이상: 0.1
    환기창_거실면적대비_비율_이상: 0.05
    방습_최하층바닥_지표면이격_이상_m: 0.45 # 바닥이 목조인 경우
    인접대지_차면시설_거리_이내_m: 2
    지하층_거실설치_원칙적_허용여부: false # 조례 예외 존재

  # 피난, 소방 및 동선 기준 [cite: 18, 19]
  피난_및_동선_기준:
    직통계단_보행거리_이하_m: 30
    직통계단_내화구조시_보행거리_이하_m: 50
    직통계단_2개소_이상_설치대상:
      다중_다가구_3층이상_거실바닥면적_이상_sqm: 200
      단독주택_3층이상_거실바닥면적_이상_sqm: 400
      지하층_거실바닥면적_이상_sqm: 200
    대지안_피난통로_유효너비_이상_m: 0.9
    복도_유효너비_연면적200sqm초과시:
      편복도_이상_m: 1.2
      양옆거실복도_이상_m: 1.5

  # 주요구조부 내화구조 의무 대상 [cite: 24, 26]
  내화구조_대상:
    다중_다가구_바닥면적합계_이상_sqm: 400
    층수기준_이상: 3 # 단독주택 중 다중/다가구는 제외, 일반 단독 기준

  # 일조권 및 부대설비 기준 [cite: 32, 33]
  일조권_및_부대설비:
    일조권_정북방향_이격거리:
      건축물높이_10m_이하_m: 1.5
      건축물높이_10m_초과: "height * 0.5" # 건축물 각 부분 높이의 1/2 이상
    피뢰설비_설치대상_높이_이상_m: 20
    전기설비공간_확보대상_연면적_이상_sqm: 500
    부설주차장_설치기준:
      시설면적_50초과_150이하_sqm: 1
      시설면적_150초과_공식: "1 + ((area_sqm - 150) / 100)"