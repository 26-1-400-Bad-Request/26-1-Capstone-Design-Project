건축물의_건축:
  # 건축허가 및 사전승인 기준
  건축허가_사전승인_대상:
    광역지자체장_허가_또는_도지사_사전승인:
      층수_이상_층: 21
      연면적합계_이상_sqm: 100000
      증축시_사전승인_조건:
        기존연면적_대비_증축비율_이상: 0.3 # 10분의 3 이상 증축
        결과적_층수_이상_층: 21
        결과적_연면적합계_이상_sqm: 100000
      적용제외_용도: ["공장", "창고", "지방건축위원회 심의를 거친 건축물"]

  # 건축신고 대상 (허가대상이나 신고로 갈음되는 조건)
  건축신고_조건:
    신축:
      바닥면적합계_이하_sqm: 100
    증축_개축_재축:
      면적증가_이하_sqm: 85
      # 3층 이상 건축물의 경우 추가 조건
      층수_3층이상시_증축비율_제한: "연면적의 1/10 이내"
    높이증축:
      증가높이_이하_m: 3
    특수지역_신축: # 관리지역, 농림지역, 자연환경보전지역
      연면적_미만_sqm: 200
      층수_미만_층: 3
      제외구역: ["지구단위계획구역", "방재지구", "붕괴위험지역"]
    산업단지_공장_신축:
      층수_이하_층: 2
      연면적_이하_sqm: 500
    대수선:
      규모제한:
        연면적_미만_sqm: 200
        층수_미만_층: 3
      주요구조부_해체없음: true # 주요구조부의 해체가 없는 등 수선에 한정

  # 가설건축물 허가 및 신고 기준
  가설건축물_허가기준: # 도시계획시설부지 등에서의 기준
    구조적_조건:
      철근콘크리트조_또는_철골철근콘크리트조_허용여부: false
      층수_이하_층: 3
    설비_및_목적_조건:
      전기_수도_가스등_새로운_간선공급설비_필요여부: false
      공동주택_판매시설_운수시설등_분양목적_허용여부: false
    존치기간:
      기본기간_이하_년: 3 # 도시/군계획사업 시행 시까지 연장 가능

  # 사용승인 및 유지관리 기한
  사용승인_및_임시사용:
    사용승인서_교부_기한:
      신청일_기준_이내_일: 7 # 검사 합격 시 7일 이내 교부
    임시사용승인:
      기본기간_이하_년: 2
      연장가능_여부: true # 대형 건축물 또는 암반공사 등 장기 공사 시

  # 철거 및 멸실 신고 기준
  철거_및_멸실:
    건축물_철거신고:
      철거예정일_이전_기한_일: 3
    건축물_멸실신고:
      멸실후_기한_이내_일: 30

  # 다중이용건축물 등 정기점검 기준
  유지관리_정기점검:
    최초점검_시점:
      사용승인일_기준_경과_년: 10
    점검주기:
      이후_매_년마다: 2