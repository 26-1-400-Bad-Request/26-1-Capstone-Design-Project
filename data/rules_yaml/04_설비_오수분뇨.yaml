가축분뇨_배출시설_기준:
  # 1. 허가대상 배출시설 (법 제11조 및 시행령 별표 1)
  허가대상_배출시설:
    돼지_사육시설:
      기본_면적_이상_sqm: 1000
      수질보전특별대책지역등_면적_이상_sqm: 500
    
    소_사육시설: # 젖소는 제외
      기본조건:
        축사면적_이상_sqm: 900
        운동장면적_이상_sqm: 450
      수질보전특별대책지역등:
        축사면적_이상_sqm: 450
        운동장면적_이상_sqm: 200
        
    젖소_사육시설:
      기본조건:
        축사면적_이상_sqm: 900
        운동장면적_이상_sqm: 2700
      수질보전특별대책지역등:
        축사면적_이상_sqm: 450
        운동장면적_이상_sqm: 1350
        
    말_사육시설:
      기본_면적_이상_sqm: 900
      수질보전특별대책지역등_면적_이상_sqm: 450
      
    닭_또는_오리_사육시설:
      기본_면적_이상_sqm: 3000

  # 2. 신고대상 배출시설 (시행령 별표 2)
  신고대상_배출시설:
    # (문서 내 스니펫에 따라 돼지 사육시설 등의 일반적인 신고대상 기준 적용)
    일반_사육시설:
      기본조건:
        면적_이상_sqm: 50
        면적_미만_sqm: 1000
      수질보전특별대책지역등:
        면적_이상_sqm: 50
        면적_미만_sqm: 500

  # 판정 엔진 메타데이터
  판정_메타데이터:
    규제_목적: "가축분뇨 처리 및 악취 저감을 위한 배출시설 설치 기준"
    엔진_판단_우선순위: "수질보전특별대책지역 여부를 먼저 판단(True/False)한 후, 해당 지역의 면적 기준을 적용할 것"
    면적_적용_기준: "축사 면적과 운동장 면적이 별도로 명시된 경우 두 조건 중 하나라도 충족(OR 조건)하면 해당 규모로 간주함"