  # 3. 공동주택
  공동주택:
    아파트: 
      is_required: true
    연립주택:
      min_households: 10 # 세대수 기준
    다세대주택:
      min_households: 10 # 세대수 기준
    기숙사:
      min_occupants: 30 # 수용 인원 기준

  # 4. 통신시설
  통신시설:
    공중전화_우체통: 
      is_required: true