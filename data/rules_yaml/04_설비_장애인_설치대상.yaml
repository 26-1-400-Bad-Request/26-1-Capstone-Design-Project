    방송통신시설_방송국_전신전화국:
      min_area_sqm: 1000
    관광휴게시설_야외음악당_야외극장:
      min_area_sqm: 1000
    관광휴게시설_휴게소:
      min_area_sqm: 300
    장례식장:
      min_area_sqm: 500 # 의료기관 부수시설 제외
    자동차관련시설_주차장_운전학원: 
      is_required: true
    교정시설_교도소_구치소: 
      is_required: true
    묘지관련시설_화장시설_봉안당: 
