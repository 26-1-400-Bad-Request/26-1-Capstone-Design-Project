대상시설별_편의시설_설치기준:
  # 1. 공공건물 및 공중이용시설 (근린생활시설, 판매시설, 업무시설 등 일반 기준)
  일반_공중이용시설:
    매개시설:
      주출입구_접근로: { 설치조건: "의무" }
      장애인전용주차구역: 
        설치조건: "의무"
        예외조건: "부설주차장 의무 설치대수가 10대 미만인 경우 제외"
      주출입구_높이차이_제거: { 설치조건: "의무" }
    내부시설:
      출입구_문: { 설치조건: "의무" }
      복도: { 설치조건: "의무" }
      계단_또는_승강기: 
        설치조건: "의무"
        권장사항: "장애인용 승강기 설치를 권장함"
    위생시설:
      장애인용_화장실_대변기: { 설치조건: "의무" }
      장애인용_화장실_소변기: { 설치조건: "의무" }
      장애인용_화장실_세면대: { 설치조건: "의무" }
    안내시설:
      점자블록: { 설치조건: "의무" }
      유도_및_안내설비: { 설치조건: "권장" } # 일반 시설은 주로 권장 사항
      경보_및_피난설비: { 설치조건: "의무" }

  # 2. 의료시설, 국가·지자체 청사, 보건소 등 (안내/이동 편의가 더 엄격하게 적용되는 시설)
  의료_및_공공업무시설:
    매개시설:
      주출입구_접근로: { 설치조건: "의무" }
      장애인전용주차구역: { 설치조건: "의무" }
      주출입구_높이차이_제거: { 설치조건: "의무" }
    내부시설:
      출입구_문: { 설치조건: "의무" }
      복도: { 설치조건: "의무" }
      계단: { 설치조건: "의무" }
      장애인용_승강기_등: { 설치조건: "의무" } # 휠체어리프트 또는 경사로 등 필수 설치
    위생시설:
      장애인용_화장실: { 설치조건: "의무" }
    안내시설:
      점자블록: { 설치조건: "의무" }
      시각장애인_유도_및_안내설비: { 설치조건: "의무" } # 일반 시설과 달리 점자안내판, 음성안내장치 의무
      경보_및_피난설비: { 설치조건: "의무" }

  # 3. 문화 및 집회시설, 수련시설 (관람석, 무대가 있는 시설)
  문화_및_집회시설:
    기타시설:
      장애인용_관람석: 
        설치조건: "의무"
        최소설치비율_공식: "전체 관람석 수의 1% 이상"
