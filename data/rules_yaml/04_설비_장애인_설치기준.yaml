      임산부_등을_위한_휴게시설: { 설치조건: "권장" }

  # 4. 숙박시설 (일반숙박시설 및 관광숙박시설)
  숙박시설:
    기타시설:
      장애인용_객실:
        설치조건: "의무"
        최소설치비율_일반: "전체 객실 수의 1% 이상"
        최소설치비율_관광호텔: "전체 객실 수의 3% 이상 (관광숙박시설에 한함)"
      접수대: { 설치조건: "의무" }

  # 5. 공동주택 (아파트 등)
  공동주택:
    매개시설:
      주출입구_접근로: { 설치조건: "의무" }
      장애인전용주차구역: { 설치조건: "의무" }
      주출입구_높이차이_제거: { 설치조건: "의무" }
    내부시설:
      출입구_문: { 설치조건: "의무" }
      장애인용_승강기: { 설치조건: "의무" }
      복도: { 설치조건: "권장" }
      계단: { 설치조건: "권장" }

  # 룰 엔진용 판정 메타데이터
  판정_메타데이터:
    판단_결과_유형: ["의무(Mandatory)", "권장(Recommended)", "예외(Exception)"]
    우선순위_적용: "의무(Mandatory) 조항 누락 시 인허가 불가(결격 사유)로 판정"