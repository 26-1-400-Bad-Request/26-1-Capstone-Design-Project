근린생활시설:
  # 용도별 분류 기준 (건축법 시행령 별표 1)
  분류기준:
    제1종근린생활시설:
      소매점_일용품점_바닥면적_미만_sqm: 1000
      휴게음식점_제과점_바닥면적_미만_sqm: 300
      의원_치과의원_한의원_침술원_약국: { 면적제한_없음: true }
      이용원_미용원_목욕장_세탁소: { 면적제한_없음: true } # 공장 부설 세탁소는 제외
      탁구장_체육도장_바닥면적_미만_sqm: 500
      마을회관_마을공동작업장_어린이집: { 면적제한_없음: true }
      동사무소_경찰서_우체국_소방서_공공도서관_바닥면적_미만_sqm: 1000
      변전소_도시가스배관시설_정수장_양수장: { 면적제한_없음: true }

    제2종근린생활시설:
      공연장_바닥면적_미만_sqm: 500 # 극장, 영화관, 연예장, 음악당 등
      종교집회장_바닥면적_미만_sqm: 500 # 교회, 성당, 사찰 등 (집회장, 휴게소 포함)
      자동차영업소_바닥면적_미만_sqm: 1000
      서점_바닥면적_이상_sqm: 1000 # 1000 미만은 제1종으로 분류됨
      총포판매소_사진관_표구점: { 면적제한_없음: true }
      청소년게임제공업소_복합유통게임제공업소_바닥면적_미만_sqm: 500
      휴게음식점_제과점_바닥면적_이상_sqm: 300 # 제1종에 해당하지 않는 것
      일반음식점: { 면적제한_없음: true }
      장의사_동물병원_동물미용실: { 면적제한_없음: true }
      학원_교습소_직업훈련소_바닥면적_미만_sqm: 500
      독서실_기원: { 면적제한_없음: true }
      테니스장_체력단련장_당구장_골프연습장_바닥면적_미만_sqm: 500
      금융업소_사무소_부동산중개사무소_결혼상담소_바닥면적_미만_sqm: 500
      다중생활시설_바닥면적_미만_sqm: 500 # 고시원 등
      제조업소_수리점_세탁소_바닥면적_미만_sqm: 500 # 대기/수질환경보전법 등 기준 충족 시
      단란주점_바닥면적_미만_sqm: 150 # 150 이상은 위락시설로 분류
      안마시술소_노래연습장: { 면적제한_없음: true }

  # 용도지역별 건축제한 (국토계획법 시행령 기준, 최종 지자체 조례 확인 필요)
  건축제한:
    주거지역:
      제1종전용: { 제1종_허용: "A", 제2종_허용: "X" } # A: 조례에 따라 조건부 허용
      제2종전용: { 제1종_허용: "A", 제2종_허용: "A" }
      제1종일반: { 제1종_허용: "O", 제2종_허용: "A" }
      제2종일반: { 제1종_허용: "O", 제2종_허용: "A" }
      제3종일반: { 제1종_허용: "O", 제2종_허용: "A" }
      준주거: { 제1종_허용: "O", 제2종_허용: "O(단란주점, 안마시술소 등 조례별 일부 제외)" }
    상업지역:
      중심_일반_근린_유통: { 제1종_허용: "O", 제2종_허용: "O(유통상업지역 내 단란주점 등 일부 제한)" }
    공업지역:
      전용_일반_준공업: { 제1종_허용: "O", 제2종_허용: "A(조례에 따라 예외 허용)" }
    녹지_및_기타지역:
      보전녹지: { 제1종_허용: "A", 제2종_허용: "A" }
      자연녹지_생산녹지: { 제1종_허용: "O", 제2종_허용: "A" }
      보전관리_생산관리: { 제1종_허용: "A", 제2종_허용: "A" }
      계획관리: { 제1종_허용: "O", 제2종_허용: "O(휴게음식점, 단란주점 등 특정 시설 제한)" }

  # 건축물 내부 설계 및 방화/피난 기준
  피난_및_설계_기준:
    직통계단_2개소_이상_설치대상:
      제2종근생중_학원_독서실_다중생활시설_3층이상_거실면적_이상_sqm: 200
      지하층_거실바닥면적_이상_sqm: 200
      일반_근생시설_3층이상_거실면적_이상_sqm: 400
    거실_반자높이_이상_m: 2.1
    복도_유효너비_연면적200sqm초과시:
      편복도_이상_m: 1.2
      양옆거실복도_이상_m: 1.5
    방화구획:
      연면적_초과_sqm: 1000 # 주요구조부 내화구조 시 1000㎡ 이내마다 구획
    내화구조_의무대상:
      제2종근생_다중생활시설_바닥면적합계_이상_sqm: 400
      건축물_층수_이상: 3 # 3층 이상 건축물 및 지하층

  # 주차장, 하수도 및 기타 부대시설 (조례/별도 고시에 따라 상이할 수 있음)
  부대시설_및_설비:
    부설주차장_설치기준:
      시설면적_기준_sqm_당_1대: 134 # 제1, 2종 근생 공통 기준
    조경의무:
      대지면적_이상_sqm: 200
    장애인_편의시설_설치의무_바닥면적기준:
      의무_소매점_이상_sqm: 300
      의무_휴게음식점_제과점_이상_sqm: 300
      의무_의원_치과의원_한의원_이상_sqm: 500
    배연설비_설치대상:
      제2종근생중_다중생활시설_공연장_종교집회장_인터넷컴퓨터게임_바닥면적_이상_sqm: 1000 # (6층 이상 건축물 시)