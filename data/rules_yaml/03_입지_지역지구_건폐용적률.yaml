지역_및_지구의_건축물:
  # 1. 국토의 용도 구분 (국토계획법 제6조 및 제36조)
  국토_용도구분:
    도시지역:
      분류: ["주거지역", "상업지역", "공업지역", "녹지지역"]
      정의: "인구와 산업이 밀집되어 있거나 밀집이 예상되어 체계적인 개발·정비·관리·보전 등이 필요한 지역"
    관리지역:
      정의: "도시지역에 준하여 관리하거나 농림업의 진흥, 자연환경 또는 산림 보전을 위해 농림지역/자연환경보전지역에 준하여 관리할 필요가 있는 지역"
    농림지역:
      정의: "도시지역에 속하지 아니하는 농지법에 따른 농업진흥지역 또는 산지관리법에 따른 보전산지 등"
    자연환경보전지역:
      정의: "자연환경, 수자원, 해안, 생태계, 상수원 및 문화재의 보전과 수산자원의 보호·육성을 위하여 필요한 지역"

  # 2. 일조 등의 확보를 위한 건축물의 높이제한 (건축법 시행령 제86조)
  일조권_높이제한:
    기본_이격거리_기준:
      건축물_높이_10m_이하_부분_m: 1.5 # 정남방향 또는 정북방향 인접대지 경계선으로부터 1.5m 이상 이격
      건축물_높이_10m_초과_부분_공식: "해당 건축물 각 부분 높이 * 0.5" # 1/2 이상 이격
      
    적용_특례_및_예외조건:
      # 정남방향 이격거리 적용을 위해 주민 의견 청취를 생략할 수 있는 사업구역
      주민의견_청취_생략_사업구역:
        - "국가산업단지, 일반산업단지, 도시첨단산업단지 및 농공단지"
        - "도시개발구역"
        - "정비구역"
      
      # 인접 대지경계선 완화 조건 (공동주택 제외)
      인접대지경계선_중심선_인정조건:
        건축이_금지된_공지에_접한경우:
          공지_종류: ["공원", "도로", "하천"]
          이격방향: "정북방향" # 정북방향으로 공지에 접한 경우 반대편 대지경계선을 기준으로 함
        소유자_합의:
          조건: "정북방향으로 접하고 있는 대지의 소유자와 이격거리에 대해 합의한 경우"
          합의시_적용여부: true