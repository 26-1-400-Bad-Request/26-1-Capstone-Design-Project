면적별_검토사항:
  # 1. 대지면적 기준 검토사항
  대지면적_기준:
    대지안의_조경:
      의무_대지면적_이상_sqm: 200
    건축물이_있는_대지의_분할제한_최소면적:
      주거지역_이상_sqm: 60
      상업지역_이상_sqm: 150
      공업지역_이상_sqm: 150
      녹지지역_이상_sqm: 200
      기타지역_이상_sqm: 60
    공개공지_확보의무:
      대상_대지면적_이상_sqm: 5000 # 문화/집회, 판매, 업무, 숙박시설 등 대상

  # 2. 바닥면적 기준 검토사항
  바닥면적_기준:
    방화구획_설치기준:
      대상_연면적_초과_sqm: 1000
      기본구획_10층이하_바닥면적마다_sqm: 1000
      스프링클러등_자동소화설비시_바닥면적마다_sqm: 3000
      11층이상_층_바닥면적마다_sqm: 200
      11층이상_실내마감불연재료시_바닥면적마다_sqm: 500
    직통계단_2개소_이상_설치기준:
      지하층_거실바닥면적_이상_sqm: 200
      판매_위락_문화_집회_거실바닥면적_이상_sqm: 200 # 용도에 따라 기준 상이
      일반거실_바닥면적_이상_sqm: 400

  # 3. 연면적 (건축물 전체 규모) 기준 검토사항
  연면적_기준:
    다중이용건축물_분류:
      다중이용건축물_해당_연면적_이상_sqm: 5000 # 특정 6개 용도 해당 시
      준다중이용건축물_해당_연면적_이상_sqm: 1000
    구조안전_확인서류_제출대상:
      일반건축물_연면적_이상_sqm: 200 # 2층 이상 등 조건 포함
      목구조건축물_연면적_이상_sqm: 500
    시공자_제한_및_설계의무:
      건설사업자_시공의무_연면적_초과_sqm: 200
      건축사_설계의무_연면적_초과_sqm: 100 # 신축 기준
    공사감리_기준:
      건축사_상주감리_대상_연면적_이상_sqm: 5000

  # 4. 기타 부대설비 및 환경 기준
  부대설비_및_기타면적_기준:
    전기설비_수전실등_설치공간_확보의무:
      연면적_이상_sqm: 500
    건축물의_에너지절약계획서_제출대상:
      연면적_이상_sqm: 500
    미술장식품_설치의무:
      연면적_이상_sqm: 10000 # 공동주택, 업무시설, 상업시설 등 대상