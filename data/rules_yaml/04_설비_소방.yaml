소방시설_설치_및_관리:
  # 1. 건축허가 등의 소방관서 사전 동의 및 통보 규정 (법 제6조)
  행정절차_판정기준:
    사전동의_필수대상:
      대상_건축행위: ["신축", "증축", "개축", "재축", "이전", "용도변경", "대수선"]
      대상_행정처분: ["허가", "협의", "사용승인", "사용검사"]
      조치사항: "행정기관은 인허가 전 관할 소방본부장이나 소방서장의 동의 획득 필수"
    
    사후통보_대상:
      대상_건축행위: ["증축", "개축", "재축", "용도변경", "대수선"]
      대상_행정처분: ["신고_수리"]
      조치사항: "신고 수리 후 지체 없이 관할 소방본부장/소방서장에게 사실 통보"

  # 2. 특정소방대상물의 분류 (문서 내 주요 시설 발췌)
  특정소방대상물_분류:
    전기저장시설:
      설치조건: "리튬, 나트륨, 레독스플로우 계열의 2차 전지를 이용한 시설"
      유사시설_포함여부: true # 집단에너지 공급시설 등 포함
      
    묘지관련시설:
      세부_용도:
        - "화장시설"
        - "봉안당" # (단, 특정 용도의 종교시설 내 봉안당 등은 별도 확인 필요)
        - "묘지와 자연장지에 부수되는 건축물"
        - "동물화장시설"
        - "동물건조장시설"
        - "동물전용 납골시설"

    관광휴게시설:
      세부_용도:
        - "야외음악당"
        - "야외극장"
        - "어린이회관"
        - "관망탑"
        - "휴게소"
        - "공원, 유원지, 관광지에 부수되는 건축물"

    장례시설:
      일반_장례식장:
        분류조건: "독립된 장례식장"
        예외조항: "의료시설의 부수시설(의료법 제36조제1호 기준)로 설치된 경우는 제외"
      동물전용_장례식장:
        분류조건: "동물 전용에 한함"

    지하가:
      정의_조건: "지하 인공구조물 안에 설치되어 상점, 사무실 등이 연속하여 지하도에 면하여 설치된 것"
      세부_유형:
        지하상가: { is_applicable: true }
        터널:
          is_applicable: true
          포함조건: "차량 등의 통행을 목적으로 지하, 수저 또는 산을 뚫어 만든 것"
          예외조건: "궤도차량용 터널은 제외"

  # 판정 엔진 메타데이터
  판정_메타데이터:
    규제_목적: "화재 재난 대비 및 소방 안전 확보"
    엔진_우선순위: "건축 허가 시 '사전동의_필수대상' 조건에 해당할 경우 소방 협의 파이프라인으로 무조건 분기할 것"